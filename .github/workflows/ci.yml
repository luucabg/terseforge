name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run check

      - name: Smoke-test CLI and benchmark
        shell: bash
        run: |
          node dist/cli.js --help
          node dist/cli.js --cwd "$RUNNER_TEMP/terseforge-smoke" init
          node dist/cli.js --cwd "$RUNNER_TEMP/terseforge-smoke" doctor
          node dist/cli.js --cwd "$RUNNER_TEMP/terseforge-smoke" bench --json
