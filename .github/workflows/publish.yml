name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v0.1.2
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$expected" ]; then
            echo "Tag $RELEASE_TAG does not match package version $expected." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run check

      - name: Publish to npm
        run: npm publish --access public
