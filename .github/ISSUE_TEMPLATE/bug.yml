name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials or sensitive raw command output. Use the Security tab for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: TerseForge version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Node 24.16.0, Codex
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include configuration and commands with secrets removed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
